version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # Kept in sync with docs/proto/buf.yaml — PeerResponse is shared by
    # AddPeer/RemovePeer, Event is the WatchEvents stream message, and
    # NodeControl deliberately omits the "Service" suffix.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_RESPONSE_STANDARD_NAME
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
